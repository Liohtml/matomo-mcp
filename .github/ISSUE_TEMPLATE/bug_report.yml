name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: input
    id: matomo-version
    attributes:
      label: Matomo version
      placeholder: "5.2.1 (Settings → System Check)"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How do you run matomo-mcp?
      options:
        - Prebuilt binary
        - cargo install
        - Docker
        - Built from source
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "Claude Code / Claude Desktop / Cursor / ..."
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the exact error output (redact your token!).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
